# Pre-commit hooks for dotfiles repository
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # SST3 Self-Optimizing hooks (Phase 5)
  - repo: local
    hooks:
      # NOTE: the following 15 canonical hooks are deliberately NOT installed in this mirror
      # (#497 B.1.3 — closure of Stage 1 §2.4 gap). All are canonical-side propagators or
      # operator-tooling that consume mirror content as input; the mirror is a consume-only
      # surface for them.
      #
      #   - sst3-managed-block-drift          — canonical-side managed-block propagator hook
      #   - check-known-repos-sync            — validates KNOWN_REPOS list (canonical-only)
      #   - check-wrapper-bash-utils-source   — canonical-side wrapper-lane source-line gate
      #   - sst3-self-test                    — wrapper-lane regression gate (canonical-only)
      #   - block-code-review-graph-token     — canonical workflow token block
      #   - ps1-parse-check                   — canonical-side PowerShell parse gate
      #   - dispatch-chain-test               — canonical-side SSH dispatch-chain regression
      #   - tailnet-acl-drift                 — canonical-side tailnet ACL gate
      #   - sst3-sync-related-code            — canonical-side research frontmatter gate
      #   - sst3-doc-frontmatter              — canonical-side research-doc frontmatter gate
      #   - sst3-pre-commit-checks            — canonical-side token-budget + observability gates
      #   - check-devprojects-clean           — requires DevProjects/ parent directory
      #   - check-claude-template-propagation — canonical-side template propagator
      #   - auto-stage-tracked-folders        — canonical-side auto-staging (SST3-metrics)
      #   - check-canonical-propagation       — canonical-side cross-mirror drift gate
      #
      # Scripts for these hooks are published in this mirror for reference but not wired here.
      - id: no-temp-folder
        name: Prevent temp/ and tmp/ folder commits
        entry: bash -c 'TEMP_FILES=$(git diff --cached --name-only | grep -E "^temp/|/temp/|^tmp/|/tmp/"); if [ -n "$TEMP_FILES" ]; then echo "ERROR - temp/tmp folders not allowed in repos."; echo "Use C:/temp/ instead and delete the folder."; echo ""; echo "Blocked files -"; echo "$TEMP_FILES"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: check-crossrepo-paths
        name: Check SST3 cross-repo path format
        entry: python scripts/check-crossrepo-paths.py
        language: python
        files: ^(standards|templates|workflow|reference)/.*\.md$
        pass_filenames: false

      - id: check-issue-assignment-change
        name: Check Issue Assignment changes
        entry: python
        args: [scripts/check-issue-assignment-change.py]
        language: system
        files: ^templates/issue-template\.md$
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: check-hardcoded-params
        name: Check for hardcoded parameters
        entry: python scripts/check-hardcoded-params.py .
        language: system
        pass_filenames: false
        always_run: true

      - id: check-ai-writing-tells
        name: Check public content for AI writing tells
        entry: python scripts/check-ai-writing-tells.py
        language: system
        files: ^cv-linkedin/.*\.md$
        pass_filenames: true

      - id: check-public-repo-secrets
        name: Check for secrets in public repo
        entry: python scripts/check-public-repo-secrets.py . --staged-only
        language: system
        pass_filenames: false
        always_run: true

      # secret-rules-drift (legacy byte-identity check for scripts/check-public-repo-secrets.py)
      # REMOVED #497 E.4.3: superseded by manifest-driven sst3-mirror-drift below.
      # The check-public-repo-secrets.py file now carries `private_term_scrub` transform
      # (canonical My Drive/Google Drive/OneDrive → mirror UserHome), so canonical and
      # mirror are intentionally non-byte-identical. The manifest-driven drift check
      # applies transforms before comparing, which is the correct semantics; the legacy
      # cmp -s hook would always FAIL for this file under the new architecture.

      - id: check-mirror-drift-self-drift
        name: Self-check that vendored check-mirror-drift.py + sst3_mirror_utils.py match canonical
        entry: bash
        args:
          - -c
          - |
            for f in check-mirror-drift.py sst3_mirror_utils.py; do
              CANONICAL=../dotfiles/SST3/scripts/$f
              LOCAL=scripts/$f
              [ -f "$CANONICAL" ] || { echo "SKIP: dotfiles not found — drift check skipped" >&2; exit 0; }
              cmp -s "$LOCAL" "$CANONICAL" || { echo "ERROR: scripts/$f has drifted from canonical. Run: cp $CANONICAL $LOCAL" >&2; exit 1; }
            done
        language: system
        pass_filenames: false
        always_run: true

      - id: sst3-mirror-drift
        name: SST3 vendored file drift check (manifest-driven)
        entry: python scripts/check-mirror-drift.py --repo SST3-AI-Harness
        language: system
        pass_filenames: false
        always_run: true

  # Standard file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

# Configuration
default_language_version:
  python: python3

# Exclude patterns
exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    __pycache__/|
    \.pytest_cache/|
    .*\.pyc|
    .*\.egg-info/|
    dist/|
    build/
  )

# Set default stages
default_stages: [pre-commit, pre-push]

# Allow running even when there are unstaged changes
fail_fast: false
